<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Hut</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Welcome to Royal Hut</h1>
        <div class="theme-toggle">
            <button id="toggle-theme">Toggle Dark/Light Mode</button>
        </div>
    </header>
    <main>
        <section class="search-filter">
            <input type="text" id="search-input" placeholder="Search menu items">
            <button id="filter-button">Filter</button>
        </section>
        <section class="menu-items" id="menu-items">
            <!-- Dynamic menu items will be rendered here -->
        </section>
        <section class="favorites">
            <h2>Favorites/Wishlist</h2>
            <div id="favorites-list"></div>
        </section>
        <section class="live-chat">
            <h2>Live Chat Support</h2>
            <div id="chat-widget">Chat widget goes here</div>
        </section>
        <section class="special-offers">
            <h2>Special Offers</h2>
            <div class="offer-banner">Banner for special offers</div>
        </section>
        <section class="photo-gallery">
            <h2>Photo Gallery</h2>
            <div class="gallery">Gallery images go here</div>
        </section>
        <section class="reviews">
            <h2>Reviews</h2>
            <div id="reviews-section"></div>
            <div class="rating-system">
                <label for="rating">Rate us:</label>
                <select id="rating">
                    <option value="1">1 Star</option>
                    <option value="2">2 Stars</option>
                    <option value="3">3 Stars</option>
                    <option value="4">4 Stars</option>
                    <option value="5">5 Stars</option>
                </select>
                <button id="submit-review">Submit Review</button>
            </div>
        </section>
        <section class="newsletter">
            <h2>Subscribe to our Newsletter</h2>
            <form id="newsletter-form">
                <input type="email" required placeholder="Enter your email">
                <button type="submit">Subscribe</button>
            </form>
        </section>
        <section class="order-history">
            <h2>Order History</h2>
            <div id="order-history-list"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Royal Hut. All rights reserved.</p>
    </footer>
</body>
</html>
